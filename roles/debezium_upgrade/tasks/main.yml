---
- name: Создать бэкап текущих плагинов
  ansible.builtin.copy:
    src: "{{ kafka_plugins_dir }}/"
    dest: "{{ kafka_plugins_dir }}.backup.{{ ansible_date_time.epoch }}"
    remote_src: true
    backup: yes
    owner: kafka
    group: kafka
    mode: preserve
  become: true

- name: Остановить Kafka Connect перед обновлением
  ansible.builtin.service:
    name: "{{ kafka_connect_service_name }}"
    state: stopped
  become: true

- name: Обновить плагины Debezium из files/
  block:
    - name: Создать каталог плагинов
      ansible.builtin.file:
        path: "{{ kafka_plugins_dir }}"
        state: directory
        owner: kafka
        group: kafka
        mode: "0755"
      become: true

    - name: Удалить только старые Debezium плагины
      ansible.builtin.file:
        path: "{{ kafka_plugins_dir }}/{{ item.name }}"
        state: absent
      loop: "{{ debezium_connectors }}"
      become: true

    - name: Распаковать новые плагины из files/
      ansible.builtin.unarchive:
        src: "{{ item.archive_file }}"
        dest: "{{ kafka_plugins_dir }}/{{ item.name }}"
        remote_src: false
      loop: "{{ debezium_connectors }}"
      become: true

  rescue:
    - name: Восстановить из бэкапа при ошибке
      ansible.builtin.copy:
        src: "{{ kafka_plugins_dir }}.backup.{{ ansible_date_time.epoch }}/"
        dest: "{{ kafka_plugins_dir }}/"
        remote_src: true
      become: true
    - name: Рестарт Kafka Connect после восстановления
      ansible.builtin.service:
        name: "{{ kafka_connect_service_name }}"
        state: started
      become: true

- name: Запустить Kafka Connect после обновления
  ansible.builtin.service:
    name: "{{ kafka_connect_service_name }}"
    state: started
    enabled: true
  become: true

- name: Проверка новых плагинов
  ansible.builtin.stat:
    path: "{{ kafka_plugins_dir }}/{{ item.name }}"
  loop: "{{ debezium_connectors }}"
  register: plugin_check

- name: Отчет об обновлении
  ansible.builtin.debug:
    msg: "✅ Плагин {{ item.item.name }} обновлен: {{ item.stat.exists }}"
  loop: "{{ plugin_check.results }}"
  when:
    - plugin_check is succeeded
    - item.stat.exists
